<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index,follow" />
    <link rel="icon" type="image/svg+xml" href="https://mendietastudio.com/favicon.svg" />
    <meta property="og:site_name" content="Mendieta Studio" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_ES" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Mendieta Studio</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.__MENDIETA_APP_BOOTED = false

      window.setTimeout(() => {
        if (window.__MENDIETA_APP_BOOTED) return

        const root = document.getElementById('root')
        if (!root || root.childElementCount > 0) return

        root.innerHTML = `
          <section style="min-height:100vh;display:grid;place-items:center;background:#f1ece3;padding:32px;">
            <article style="max-width:720px;width:100%;border-top:1px solid rgba(27,26,24,.2);padding-top:24px;color:#1b1a18;font-family:Inter,system-ui,-apple-system,'Segoe UI',sans-serif;line-height:1.7;">
              <p style="margin:0 0 10px 0;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#7a6650;">Mendieta Studio</p>
              <h1 style="margin:0 0 12px 0;font-family:'Libre Baskerville','Times New Roman',serif;font-weight:400;font-size:clamp(1.6rem,4vw,2.2rem);line-height:1.2;">No se pudo cargar la aplicación</h1>
              <p style="margin:0;color:#6a645b;">
                Detectamos un problema al cargar los módulos de JavaScript. Esto suele ocurrir cuando el sitio no está publicando el artefacto compilado de Vite.
              </p>
            </article>
          </section>
        `
      }, 2200)
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

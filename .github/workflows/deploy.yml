name: Deploy Mendieta Studio

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/configure-pages@v5
      - run: npm ci
      - run: npm run build
      - name: Validate Pages artifact
        run: |
          test -f dist/index.html
          test -f dist/CNAME
          test -d dist/assets
          grep -qx "mendietastudio.com" dist/CNAME
          grep -Eq 'src="/assets/.+\.js"' dist/index.html
          grep -Eq 'href="/assets/.+\.css"' dist/index.html
          if grep -q '/src/main.jsx' dist/index.html; then
            echo "ERROR: dist/index.html must not reference /src/main.jsx"
            exit 1
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

<!DOCTYPE html>
<html lang='es'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Contact | Mendieta Studio</title>
  <link rel='stylesheet' href='styles.css'>
</head>
<body>
  <header class='header'>
    <div class='wrap nav'>
      <a href='index.html' class='brand'><strong>mendieta</strong><span>studio</span></a>
      <nav class='nav-links'>
        <a href='index.html'>Home</a>
        <a href='projects.html'>Projects</a>
        <a href='studio.html'>Studio</a>
        <a href='services.html'>Services</a>
        <a href='contact.html'>Contact</a>
      </nav>
    </div>
  </header>

  <main class='page-hero'>
    <div class='wrap'>
      <div class='kicker'>Contact</div>
      <h1>Hablemos de tu proyecto.</h1>

      <div class='grid2 contact-layout'>
        <div class='box'>
          <h3>Contacto directo</h3>
          <p>
            <a class='text-link' href='mailto:contacto@mendietastudio.com'>contacto@mendietastudio.com</a><br>
            +34 608 856 568
          </p>
          <h3>Ubicación</h3>
          <p>Pozoblanco, Córdoba, España</p>
        </div>

        <div class='box contact-form-box'>
          <h3>Enviar consulta</h3>
          <form id='contactForm' class='contact-form' novalidate>
            <input type='hidden' name='access_key' value='9d064af6-bb40-4732-9a1f-519b6da716a6'>
            <input type='checkbox' name='botcheck' class='hidden-field' tabindex='-1' autocomplete='off'>

            <label for='fullName'>Nombre completo</label>
            <input id='fullName' name='name' type='text' required autocomplete='name'>

            <label for='email'>Correo electrónico</label>
            <input id='email' name='email' type='email' required autocomplete='email'>

            <label for='company'>Empresa / Organización <span>(opcional)</span></label>
            <input id='company' name='company' type='text' autocomplete='organization'>

            <label for='inquiryType'>Tipo de consulta</label>
            <select id='inquiryType' name='inquiry_type' required>
              <option value='' selected disabled>Seleccione una opción</option>
              <option value='Proyecto residencial'>Proyecto residencial</option>
              <option value='Proyecto comercial'>Proyecto comercial</option>
              <option value='Colaboración profesional'>Colaboración profesional</option>
              <option value='Consultoría técnica'>Consultoría técnica</option>
              <option value='Otro'>Otro</option>
            </select>

            <label for='message'>Mensaje</label>
            <textarea id='message' name='message' rows='6' required></textarea>

            <button type='submit' id='submitButton'>Enviar Consulta</button>
            <p id='formStatus' class='form-status' aria-live='polite'></p>
          </form>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class='wrap footer-inner'>
      <span>© 2026 Mendieta Studio.</span>
      <nav class='legal'>
        <a href='aviso-legal.html'>Legal Notice</a>
        <a href='politica-privacidad.html'>Privacy Policy</a>
        <a href='politica-cookies.html'>Cookies Policy</a>
      </nav>
    </div>
  </footer>

  <script>
    const form = document.getElementById('contactForm');
    const status = document.getElementById('formStatus');
    const submitButton = document.getElementById('submitButton');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      if (!form.checkValidity()) {
        status.textContent = 'Por favor, complete los campos requeridos correctamente.';
        status.className = 'form-status error';
        form.reportValidity();
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = 'Enviando...';
      status.textContent = '';

      try {
        const formData = new FormData(form);
        formData.append('subject', 'Nueva consulta desde Mendieta Studio');

        const response = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          body: formData
        });

        const result = await response.json();

        if (result.success) {
          status.textContent = 'Gracias por su mensaje. Nos pondremos en contacto con usted a la mayor brevedad posible.';
          status.className = 'form-status success';
          form.reset();
        } else {
          status.textContent = 'No se pudo enviar su consulta. Inténtelo nuevamente en unos minutos.';
          status.className = 'form-status error';
        }
      } catch (error) {
        status.textContent = 'No se pudo enviar su consulta. Revise su conexión e inténtelo nuevamente.';
        status.className = 'form-status error';
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = 'Enviar Consulta';
      }
    });
  </script>
</body>
</html>
